<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Weather Dashboard</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.15); }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: url('https://wallpaperaccess.com/full/42636.png') center/cover fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            margin: 0;
            transition: background 0.5s ease;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 90%;
            max-width: 800px;
            padding: 30px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Full width header for themes */
        .theme-header {
            grid-column: 1 / 3;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-bottom: 10px;
        }

        .hero { grid-column: 1 / 2; }
        .details { grid-column: 2 / 3; display: flex; flex-direction: column; justify-content: center; }

        input { padding: 10px; border-radius: 8px; border: none; width: 100%; margin-bottom: 10px; }
        button { padding: 10px; cursor: pointer; border-radius: 8px; border: none; background: #007BFF; color: white; transition: 0.3s; }
        button:hover { background: #0056b3; }

        .stat-card { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="dashboard">
        <header class="theme-header">
            <button onclick="changeTheme('https://wallpaperaccess.com/full/42636.png')">1</button>
            <button onclick="changeTheme('https://i.pinimg.com/originals/2d/71/c2/2d71c2d1f45817d54578476b793d9d3d.jpg')">2</button>
            <button onclick="changeTheme('https://www.desktophut.com/images/spider-noir-live-wallpaper-1778232475.webp')">3</button>
            <button onclick="changeTheme('https://wallpaperaccess.com/full/2908267.jpg')">4</button>
        </header>

        <div class="hero">
            <h1>Weather App</h1>
            <input type="text" id="city-input" placeholder="Enter city...">
            <button id="search-button">Get Weather</button>
            <h2 id="temp">--°C</h2>
            <p id="desc">Enter a city to start</p>
        </div>

        <div class="details">
            <div class="stat-card">Humidity: <span id="humidity">--</span>%</div>
            <div class="stat-card">Wind Speed: <span id="wind">--</span> km/h</div>
            <div class="stat-card">Pressure: <span id="pressure">--</span> hPa</div>
        </div>
    </div>

    <script>
        const apiKey = '7d77230cd34373ff23437ca9e956c0ce'; 

        // Theme Changer Function
        function changeTheme(imageUrl) {
            document.body.style.backgroundImage = `url('${imageUrl}')`;
        }

        // Weather Logic
        async function getWeather(city) {
            const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error("City not found");
                const data = await res.json();
                
                document.getElementById('temp').innerText = `${Math.round(data.main.temp)}°C`;
                document.getElementById('desc').innerText = data.weather[0].description;
                document.getElementById('humidity').innerText = data.main.humidity;
                document.getElementById('wind').innerText = data.wind.speed;
                document.getElementById('pressure').innerText = data.main.pressure;
            } catch (e) {
                alert(e.message);
            }
        }

        document.getElementById('search-button').onclick = () => {
            const city = document.getElementById('city-input').value;
            if (city) getWeather(city);
        };
    </script>
</body>
</html>
